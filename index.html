<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harmony Diet Journal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8A9A8B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="飲食紀錄">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3565/3565418.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            background-color: #F5F2ED; /* 奶油底色 */
            color: #4A4E51;            /* 炭灰文字 */
        }
        .color-sage { background-color: #8A9A8B; }      /* 鼠尾草綠 */
        .color-mauve { background-color: #9B8E94; }     /* 豆沙紅 */
        .text-mauve { color: #9B8E94; }
        .text-sage { color: #8A9A8B; }
        
        /* 自訂莫蘭迪風勾選框 */
        .custom-checkbox:checked + label {
            background-color: #8A9A8B;
            color: white;
            border-color: #8A9A8B;
        }
        .badge-checkbox:checked + label {
            background-color: #9B8E94;
            color: white;
            border-color: #9B8E94;
        }

        input[type="date"] {
            box-sizing: border-box;
            appearance: none;
            -webkit-appearance: none;
        }
    </style>
</head>
<body class="min-h-screen pb-24 font-sans antialiased">

    <div class="max-w-md mx-auto px-4 pt-6">
        
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold tracking-wide text-mauve">Harmony Diet Journal</h1>
            <p class="text-xs text-gray-400 mt-1">用溫柔調色盤，紀錄每日的平衡</p>
        </header>

        <div id="page-record" class="space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-100">
                <h2 class="text-lg font-medium mb-4 flex items-center gap-2">
                    <span class="w-2 h-5 color-sage rounded-full"></span> 新增飲食日誌
                </h2>
                
                <form id="dietForm" class="space-y-4" onsubmit="return false;">
                    <div>
                        <label class="block text-xs font-medium text-stone-500 mb-1.5">紀錄日期</label>
                        <div class="w-full">
                            <input type="date" id="inputDate" required class="w-full block rounded-xl border border-stone-200 bg-stone-50 p-3 text-sm focus:outline-none focus:ring-1 focus:ring-[#8A9A8B] box-border">
                        </div>
                    </div>

                    <div class="space-y-3 bg-stone-50/60 p-3 rounded-xl border border-stone-100">
                        <div>
                            <label class="block text-xs font-semibold text-stone-500 mb-1.5">1. 選擇餐別 (可複選)</label>
                            <div class="grid grid-cols-3 gap-1.5">
                                <div>
                                    <input type="checkbox" name="mealType" value="早餐" id="meal-breakfast" class="hidden custom-checkbox">
                                    <label for="meal-breakfast" class="block text-center border border-stone-200 bg-white p-2 rounded-lg text-xs font-medium text-stone-600 cursor-pointer transition select-none">🌅 早餐</label>
                                </div>
                                <div>
                                    <input type="checkbox" name="mealType" value="午餐" id="meal-lunch" class="hidden custom-checkbox">
                                    <label for="meal-lunch" class="block text-center border border-stone-200 bg-white p-2 rounded-lg text-xs font-medium text-stone-600 cursor-pointer transition select-none">☀️ 午餐</label>
                                </div>
                                <div>
                                    <input type="checkbox" name="mealType" value="晚餐" id="meal-dinner" class="hidden custom-checkbox">
                                    <label for="meal-dinner" class="block text-center border border-stone-200 bg-white p-2 rounded-lg text-xs font-medium text-stone-600 cursor-pointer transition select-none">🌌 晚餐</label>
                                </div>
                                <div>
                                    <input type="checkbox" name="mealType" value="點心" id="meal-snack" class="hidden custom-checkbox">
                                    <label for="meal-snack" class="block text-center border border-stone-200 bg-white p-2 rounded-lg text-xs font-medium text-stone-600 cursor-pointer transition select-none">🍪 點心</label>
                                </div>
                                <div class="col-span-2">
                                    <input type="checkbox" name="mealType" value="其他" id="meal-other" class="hidden custom-checkbox">
                                    <label for="meal-other" class="block text-center border border-stone-200 bg-white p-2 rounded-lg text-xs font-medium text-stone-600 cursor-pointer transition select-none">🌿 其他</label>
                                </div>
                            </div>
                        </div>

                        <div class="border-t border-dashed border-stone-200 my-2"></div>

                        <div>
                            <label class="block text-xs font-semibold text-stone-500 mb-1.5">2. 包含屬性 (特殊紀錄，可不勾)</label>
                            <div class="grid grid-cols-3 gap-1.5">
                                <div>
                                    <input type="checkbox" name="foodFeature" value="飲料" id="feat-drink" class="hidden badge-checkbox">
                                    <label for="feat-drink" class="block text-center border border-stone-200 bg-white p-2 rounded-lg text-xs font-medium text-stone-600 cursor-pointer transition select-none">🥤 飲料</label>
                                </div>
                                <div>
                                    <input type="checkbox" name="foodFeature" value="甜食" id="feat-sweet" class="hidden badge-checkbox">
                                    <label for="feat-sweet" class="block text-center border border-stone-200 bg-white p-2 rounded-lg text-xs font-medium text-stone-600 cursor-pointer transition select-none">🍫 甜食</label>
                                </div>
                                <div>
                                    <input type="checkbox" name="foodFeature" value="油炸" id="feat-fried" class="hidden badge-checkbox">
                                    <label for="feat-fried" class="block text-center border border-stone-200 bg-white p-2 rounded-lg text-xs font-medium text-stone-600 cursor-pointer transition select-none">🍟 油炸</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-stone-500 mb-1">飲食內容 (品項請用、或空格分開，例如：咖啡、糖心蛋)</label>
                        <textarea id="content" required rows="3" placeholder="今天吃了、喝了些什麼呢？" class="w-full rounded-xl border border-stone-200 bg-stone-50 p-3 text-sm focus:outline-none focus:ring-1 focus:ring-[#8A9A8B]"></textarea>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[11px] font-medium text-stone-400">💡 常用食物快捷鍵 (點擊直接填入)</label>
                        <div id="quickTagsContainer" class="flex flex-wrap gap-1.5 min-h-[28px]">
                            <span class="text-xs text-stone-300 italic">載入常用食物中...</span>
                        </div>
                    </div>

                    <button id="btnSubmit" type="button" class="w-full color-sage hover:bg-[#79897A] text-white font-medium p-3 rounded-xl transition duration-200 shadow-sm mt-2">
                        儲存至日誌
                    </button>
                </form>
            </div>
        </div>

        <div id="page-history" class="space-y-4 hidden">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-stone-100 space-y-2">
                <label class="block text-xs font-bold text-mauve flex items-center gap-1">📊 常用食物排行榜 (全部累積計數)</label>
                <div id="statsContainer" class="grid grid-cols-2 gap-2 text-xs text-stone-600 pt-1">
                    </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-stone-100 space-y-3">
                <label class="block text-xs font-medium text-stone-500">依日期篩選紀錄</label>
                <div class="flex gap-2">
                    <input type="date" id="filterDate" class="flex-1 min-w-0 rounded-xl border border-stone-200 bg-stone-50 p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#9B8E94] box-border">
                    <button id="btnToday" type="button" class="px-4 bg-stone-100 hover:bg-stone-200 rounded-xl text-xs font-medium transition shrink-0">
                        今天
                    </button>
                </div>
            </div>

            <div id="logsContainer" class="space-y-3">
                </div>
        </div>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-stone-200/60 pb-5 pt-2 shadow-lg">
        <div class="max-w-md mx-auto flex justify-around">
            <button id="nav-record" type="button" class="flex flex-col items-center gap-1 text-sage">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                </svg>
                <span class="text-xs font-medium">填寫紀錄</span>
            </button>

            <button id="nav-history" type="button" class="flex flex-col items-center gap-1 text-stone-400">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.03 0 1.9.693 2.166 1.638m-7.377 0A48.536 48.536 0 0112 3m0 0c2.917 0 5.747.294 8.5.862m-21 10.394c0-1.135.845-2.098 1.976-2.192a48.424 48.424 0 011.123-.08M3.108 18c2.917 0 5.747-.294 8.5-.862m0 0V4.5m0 13.5v-3" />
                </svg>
                <span class="text-xs font-medium">歷史查看</span>
            </button>
        </div>
    </nav>

    <script>
        const SUPABASE_URL = 'https://lpwbvqalnouufpldufae.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxwd2J2cWFsbm91dWZwbGR1ZmFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDQxODgsImV4cCI6MjA5NTM4MDE4OH0.ZNjhiXqMtKSp9pVv9cjM-UJGnB7HH_8j3qpm4CJdBiE';
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const getTodayString = () => {
            const now = new Date();
            const offset = now.getTimezoneOffset();
            const localDate = new Date(now.getTime() - (offset * 60 * 1000));
            return localDate.toISOString().split('T')[0];
        };

        document.getElementById('inputDate').value = getTodayString();
        document.getElementById('filterDate').value = getTodayString();

        // 頁面切換控制
        const pageRecord = document.getElementById('page-record');
        const pageHistory = document.getElementById('page-history');
        const navRecord = document.getElementById('nav-record');
        const navHistory = document.getElementById('nav-history');

        navRecord.addEventListener('click', (e) => {
            e.preventDefault();
            pageRecord.classList.remove('hidden');
            pageHistory.classList.add('hidden');
            navRecord.className = "flex flex-col items-center gap-1 text-sage";
            navHistory.className = "flex flex-col items-center gap-1 text-stone-400";
            loadGlobalSuggestions(); // 切回首頁時重新整理推薦標籤
        });

        navHistory.addEventListener('click', (e) => {
            e.preventDefault();
            pageRecord.classList.add('hidden');
            pageHistory.classList.remove('hidden');
            navRecord.className = "flex flex-col items-center gap-1 text-stone-400";
            navHistory.className = "flex flex-col items-center gap-1 text-mauve";
            fetchLogsByDate();
            calculateFoodStatistics(); // 切換到歷史時計算個別食品統計
        });

        // 💡 核心演算：將大段文字切碎成獨立食物品項陣列
        function tokenizeContent(text) {
            if (!text) return [];
            // 使用正則表達式，支援「、」、「，」、「,」、「空格」、「換行」進行精準切分
            return text.split(/[\u3001\uff0c,\s\n]+/)
                       .map(item => item.trim())
                       .filter(item => item.length > 0 && item !== '無');
        }

        // 💡 核心演算法：從所有歷史資料中計算出「常用食物與次數」
        async function fetchAllFoodCounts() {
            const { data, error } = await db.from('diet_logs').select('content');
            if (error || !data) return [];

            const counts = {};
            data.forEach(log => {
                const items = tokenizeContent(log.content);
                items.forEach(item => {
                    counts[item] = (counts[item] || 0) + 1;
                });
            });

            // 轉成陣列並按照出現次數由大到小排序
            return Object.entries(counts).sort((a, b) => b[1] - a[1]);
        }

        // 功能 A：載入「輸入框下方」的常用推薦小標籤
        async function loadGlobalSuggestions() {
            const container = document.getElementById('quickTagsContainer');
            const sortedFoods = await fetchAllFoodCounts();

            if (sortedFoods.length === 0) {
                container.innerHTML = `<span class="text-xs text-stone-400 italic">多紀錄幾次後，這裡會出現常用快捷鍵喔！</span>`;
                return;
            }

            // 取出前 8 名最常吃的東西做成按鈕
            const topFoods = sortedFoods.slice(0, 8);
            container.innerHTML = topFoods.map(([foodName, count]) => {
                return `<button type="button" onclick="appendFoodToInput('${foodName}')" class="px-2.5 py-1 bg-stone-100 hover:bg-stone-200 text-stone-600 rounded-lg text-xs font-medium transition active:scale-95 shadow-sm border border-stone-200/40">
                    ${foodName} <span class="text-[10px] text-stone-400 font-normal">(${count})</span>
                </button>`;
            }).join('');
        }

        // 點擊常用標籤時，自動幫忙加到輸入框裡（自動用頓號隔開）
        window.appendFoodToInput = function(foodName) {
            const textarea = document.getElementById('content');
            const currentVal = textarea.value.trim();
            if (!currentVal) {
                textarea.value = foodName;
            } else {
                // 如果最後一個字不是頓號，就幫他補上頓號再塞入新食物
                if (currentVal.endsWith('、') || currentVal.endsWith('，')) {
                    textarea.value = currentVal + foodName;
                } else {
                    textarea.value = currentVal + '、' + foodName;
                }
            }
            textarea.focus();
        };

        // 功能 B：計算並顯示在歷史頁面最上方的「個別食物統計排行榜」
        async function calculateFoodStatistics() {
            const statsContainer = document.getElementById('statsContainer');
            statsContainer.innerHTML = `<p class="col-span-2 text-stone-400 italic text-xs">正在分析統計數據...</p>`;

            const sortedFoods = await fetchAllFoodCounts();

            if (sortedFoods.length === 0) {
                statsContainer.innerHTML = `<p class="col-span-2 text-stone-400 italic text-xs">暫無統計資料</p>`;
                return;
            }

            // 取前 6 名最常吃的食物渲染成漂亮的小進度條或計數
            const topSix = sortedFoods.slice(0, 6);
            statsContainer.innerHTML = topSix.map(([foodName, count], index) => {
                const rankMedals = ['🥇', '🥈', '🥉', '✨', '✨', '✨'];
                const medal = rankMedals[index] || '•';
                return `
                    <div class="flex justify-between items-center bg-stone-50 p-2 rounded-lg border border-stone-100 shadow-2xs">
                        <span class="font-medium truncate pr-1">${medal} ${foodName}</span>
                        <span class="px-2 py-0.5 bg-mauve/10 text-mauve font-bold rounded-md text-[10px] shrink-0">${count} 次</span>
                    </div>
                `;
            }).join('');
        }

        // 頁面初始化
        loadGlobalSuggestions();

        // 新增紀錄
        document.getElementById('btnSubmit').addEventListener('click', async (e) => {
            e.preventDefault();
            
            const logDate = document.getElementById('inputDate').value;
            const content = document.getElementById('content').value;
            
            if (!content.trim()) {
                alert('請填寫飲食內容喔！');
                return;
            }

            const checkedMeals = document.querySelectorAll('input[name="mealType"]:checked');
            if (checkedMeals.length === 0) {
                alert('請至少勾選一個「主要餐別」喔！');
                return;
            }
            const mealsArray = Array.from(checkedMeals).map(cb => cb.value);
            
            const checkedFeatures = document.querySelectorAll('input[name="foodFeature"]:checked');
            const featuresArray = Array.from(checkedFeatures).map(cb => cb.value);
            
            const finalTagsArray = [...mealsArray, ...featuresArray];
            const mealTypeCombined = finalTagsArray.join('、');

            const { error } = await db
                .from('diet_logs')
                .insert([{ log_date: logDate, meal_type: mealTypeCombined, content: content }]);

            if (error) {
                alert('儲存失敗，請檢查：' + error.message);
            } else {
                alert('✨ 紀錄成功！');
                document.getElementById('content').value = '';
                checkedMeals.forEach(cb => cb.checked = false);
                checkedFeatures.forEach(cb => cb.checked = false);
                document.getElementById('filterDate').value = logDate;
                
                // 即時重新整理首頁的常用食物推薦
                loadGlobalSuggestions();
            }
        });

        // 定義色彩調色盤
        const colorPalette = {
            '早餐': { bg: 'bg-[#E6DCD0]', text: 'text-[#7A6F5D]', border: '#E6DCD0' },
            '午餐': { bg: 'bg-[#EAD5C3]', text: 'text-[#8C5E38]', border: '#EAD5C3' },
            '晚餐': { bg: 'bg-[#D2DCD6]', text: 'text-[#4A6456]', border: '#D2DCD6' },
            '點心': { bg: 'bg-[#DECFC7]', text: 'text-[#7D5C4C]', border: '#DECFC7' },
            '飲料': { bg: 'bg-[#EADCC9]', text: 'text-[#946B38]', border: '#EADCC9' },
            '甜食': { bg: 'bg-[#EAD1DC]', text: 'text-[#964B6B]', border: '#EAD1DC' },
            '油炸': { bg: 'bg-[#EAE3CD]', text: 'text-[#877437]', border: '#EAE3CD' },
            '其他': { bg: 'bg-[#D9E2D5]', text: 'text-[#5A6E53]', border: '#D9E2D5' }
        };

        // 依日期篩選讀取
        const filterDateInput = document.getElementById('filterDate');
        const logsContainer = document.getElementById('logsContainer');

        async function fetchLogsByDate() {
            const selectedDate = filterDateInput.value;
            if (!selectedDate) return;

            logsContainer.innerHTML = `<p class="text-center text-stone-400 py-6 text-sm">正在讀取日誌...</p>`;

            const { data, error } = await db
                .from('diet_logs')
                .select('*')
                .eq('log_date', selectedDate)
                .order('created_at', { ascending: true });

            if (error) {
                logsContainer.innerHTML = `<p class="text-red-400 text-sm text-center py-4">讀取失敗：${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                logsContainer.innerHTML = `<p class="text-center text-stone-400 py-12 text-sm">這天還沒有留下任何飲食足跡喔 🌿</p>`;
                return;
            }

            logsContainer.innerHTML = data.map(log => {
                const tags = log.meal_type.split('、');
                
                const tagsHtml = tags.map(tag => {
                    const style = colorPalette[tag] || { bg: 'bg-stone-100', text: 'text-stone-600' };
                    return `<span class="px-2 py-0.5 ${style.bg} ${style.text} text-[11px] font-medium rounded-md shadow-sm"># ${tag}</span>`;
                }).join(' ');

                const firstColor = colorPalette[tags[0]]?.border || '#8A9A8B';
                const lastColor = colorPalette[tags[tags.length - 1]]?.border || '#8A9A8B';
                const borderStyle = `border-image: linear-gradient(to bottom, ${firstColor}, ${lastColor}) 1; border-left-width: 4px;`;

                // 在顯示歷史卡片內容時，把被拆分的品項用漂亮的虛線高亮，看起來更精緻
                const individualItems = tokenizeContent(log.content);
                let highlightedContent = log.content;
                
                return `
                    <div style="${borderStyle}" class="bg-white p-4 rounded-r-xl shadow-sm border-y border-r border-stone-100/70 flex justify-between items-start transition hover:translate-x-0.5 duration-200">
                        <div class="space-y-2 flex-1 pr-2">
                            <div class="flex flex-wrap gap-1.5">
                                ${tagsHtml}
                            </div>
                            <p class="text-stone-700 text-sm leading-relaxed whitespace-pre-line font-normal">${highlightedContent}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        filterDateInput.addEventListener('change', fetchLogsByDate);

        document.getElementById('btnToday').addEventListener('click', (e) => {
            e.preventDefault();
            filterDateInput.value = getTodayString();
            fetchLogsByDate();
        });
    </script>
</body>
</html>
